spring.application.name=API-GATEWAY
server.port=8085

spring.cloud.gateway.routes[0].id=student-service
spring.cloud.gateway.routes[0].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/students/**

spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[2].id=course-service
spring.cloud.gateway.routes[2].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/courses/**

spring.cloud.gateway.routes[3].id=attendance-service
spring.cloud.gateway.routes[3].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/attendance/**

spring.cloud.gateway.routes[4].id=result-service
spring.cloud.gateway.routes[4].uri=lb://RESULT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/results/**

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
